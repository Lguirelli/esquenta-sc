<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ranking de Positivação Eurofarma</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
    }

    .screen {
      min-height: 100vh;
      position: relative;
      box-sizing: border-box;

      padding: 130px 48px 120px;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* HEADER */

    .opella-header {
      position: fixed;

      top: 0;
      left: 0;

      width: 100%;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 28px 0 18px;

      z-index: 20;

      pointer-events: none;
    }

    /* FOOTER */

    .grupofarma-footer {
      position: fixed;

      bottom: 0;
      left: 0;

      width: 100%;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 18px 0 28px;

      z-index: 20;

      pointer-events: none;
    }

    /* ÁREA RANKING */

    .ranking-area {
      width: min(100%, 1180px);

      min-height: 520px;

      display: flex;
      justify-content: center;
      align-items: center;

      position: relative;

      z-index: 5;
    }

    .ranking-area .podium {
      width: 100%;
    }

    /* RESPONSIVO */

    @media (max-width: 768px) {
      .screen {
        padding: 110px 20px 100px;
      }

      .ranking-area {
        min-height: 420px;
      }
    }
  </style>
</head>

<body>
  <main class="screen background-screen">

    <!-- HEADER -->

    <header class="opella-header" aria-label="Cabeçalho Opella">
      <img
        class="opella"
        src="assets/opella-logo.png"
        alt="Opella"
      />
    </header>

    <!-- RANKING -->

    <section
      class="ranking-area"
      aria-label="Área dinâmica do ranking"
    >

      <section class="podium" id="podium">

        <div class="duo" data-duo="marcelly-raquel">
          <img
            class="duo-image"
            src="assets/duplas/marcelly-raquel.png"
            alt="Marcelly e Raquel"
          />

          <span class="duo-name">
            Raquel & Marcelly 
          </span>
        </div>

        <div class="duo" data-duo="michele-debora">
          <img
            class="duo-image"
            src="assets/duplas/michele-debora.png"
            alt="Michele e Debora"
          />

          <span class="duo-name">
            Michele & Debora
          </span>
        </div>

        <div class="duo" data-duo="yasmin-laylla">
          <img
            class="duo-image"
            src="assets/duplas/yasmin-laylla.png"
            alt="Yasmin e Laylla"
          />

          <span class="duo-name">
           Laylla & Yasmin
          </span>
        </div>

        <div class="duo" data-duo="alicia-ana">
          <img
            class="duo-image"
            src="assets/duplas/alicia-ana.png"
            alt="Alicia e Ana"
          />

          <span class="duo-name">
            Ana & Alicia 
          </span>
        </div>

      </section>

      <!-- VALORES -->

      <textarea id="inputValores" hidden>
Marcelly-Raquel 0
Michele-Debora 0
Yasmin-Laylla 0
Alicia-Ana 0
      </textarea>

    </section>

    <!-- FOOTER -->

    <footer
      class="grupofarma-footer"
      aria-label="Rodapé GrupoFarma"
    >
      <img
        class="grupofarma"
        src="assets/grupofarma-logo.png"
        alt="GrupoFarma"
      />
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
