<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Dia D Esquenta SC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Kannada:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell background-screen" data-portfolio-app="dia-d-esquenta-sc">
    <header class="brand-header" aria-label="Cabeçalho Esquenta SC">
      <video class="brand-logo brand-logo-esquenta-sc" autoplay muted loop playsinline preload="auto" aria-label="Logo Esquenta SC em animação">
        <source src="./assets/logo-esquenta-sc.mp4" type="video/mp4">
      </video>
    </header>

    <section class="ranking-area" aria-label="Ranking de positivação individual">
      <section class="podium" id="podium" aria-live="polite">
        <article class="participant" data-participant="alicia">
          <div class="participant-stage">
            <span class="participant-name">Alicia</span>
          </div>
        </article>

        <article class="participant" data-participant="marcelly">
          <div class="participant-stage">
            <span class="participant-name">Marcelly</span>
          </div>
        </article>

        <article class="participant" data-participant="michele">
          <div class="participant-stage">
            <span class="participant-name">Michele</span>
          </div>
        </article>

        <article class="participant" data-participant="pamela">
          <div class="participant-stage">
            <span class="participant-name">Pamela</span>
          </div>
        </article>

        <article class="participant" data-participant="yasmin">
          <div class="participant-stage">
            <span class="participant-name">Yasmin</span>
          </div>
        </article>
      </section>
    </section>

    <footer class="brand-footer" aria-label="Rodapé GrupoFarma">
      <img class="brand-logo brand-logo-grupofarma" src="./assets/grupofarma-logo.png" alt="GrupoFarma" />
    </footer>

    <section class="ranking-source" id="ranking-source" hidden aria-hidden="true">
      <span data-score-for="alicia">0</span>
      <span data-score-for="marcelly">0</span>
      <span data-score-for="michele">0</span>
      <span data-score-for="pamela">0</span>
      <span data-score-for="yasmin">0</span>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
