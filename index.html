<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#003f10" />

  <title>Dia D Eurofarma</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="app-shell background-screen" data-portfolio-app="dia-d-eurofarma">
    <header class="brand-header" aria-label="Cabeçalho Opella">
      <img class="brand-logo brand-logo-opella" src="./assets/opella-logo.png" alt="Opella" />
    </header>

    <section class="ranking-area" aria-label="Ranking de positivação">
      <section class="podium" id="podium" aria-live="polite">
        <article class="duo" data-duo="marcelly-raquel">
          <img class="duo-image" src="./assets/duplas/marcelly-raquel.png" alt="Raquel e Marcelly" />
          <span class="duo-name">Raquel &amp; Marcelly</span>
        </article>

        <article class="duo" data-duo="michele-debora">
          <img class="duo-image" src="./assets/duplas/michele-debora.png" alt="Michele e Debora" />
          <span class="duo-name">Michele &amp; Debora</span>
        </article>

        <article class="duo" data-duo="yasmin-laylla">
          <img class="duo-image" src="./assets/duplas/yasmin-laylla.png" alt="Laylla e Yasmin" />
          <span class="duo-name">Laylla &amp; Yasmin</span>
        </article>

        <article class="duo" data-duo="alicia-ana">
          <img class="duo-image" src="./assets/duplas/alicia-ana.png" alt="Ana e Alicia" />
          <span class="duo-name">Ana &amp; Alicia</span>
        </article>
      </section>

      <section class="controls-panel" aria-label="Controle de valores de positivação">
        <div class="total-card">
          <span class="total-label">Valor total de positivações</span>
          <strong class="total-value" id="totalValue">R$ 0,00</strong>
        </div>

        <div class="slider-grid" id="sliderGrid">
          <label class="duo-slider" data-control="marcelly-raquel">
            <span class="slider-topline">
              <span class="slider-name">Raquel &amp; Marcelly</span>
              <strong class="slider-value" data-value-for="marcelly-raquel">R$ 142.554,36</strong>
            </span>
            <input
              type="range"
              min="0"
              max="200000"
              step="100"
              value="142554.36"
              data-slider="marcelly-raquel"
              aria-label="Valor de positivação Raquel e Marcelly"
            />
          </label>

          <label class="duo-slider" data-control="michele-debora">
            <span class="slider-topline">
              <span class="slider-name">Michele &amp; Debora</span>
              <strong class="slider-value" data-value-for="michele-debora">R$ 80.627,09</strong>
            </span>
            <input
              type="range"
              min="0"
              max="200000"
              step="100"
              value="80627.09"
              data-slider="michele-debora"
              aria-label="Valor de positivação Michele e Debora"
            />
          </label>

          <label class="duo-slider" data-control="yasmin-laylla">
            <span class="slider-topline">
              <span class="slider-name">Laylla &amp; Yasmin</span>
              <strong class="slider-value" data-value-for="yasmin-laylla">R$ 5.877,73</strong>
            </span>
            <input
              type="range"
              min="0"
              max="200000"
              step="100"
              value="5877.73"
              data-slider="yasmin-laylla"
              aria-label="Valor de positivação Laylla e Yasmin"
            />
          </label>

          <label class="duo-slider" data-control="alicia-ana">
            <span class="slider-topline">
              <span class="slider-name">Ana &amp; Alicia</span>
              <strong class="slider-value" data-value-for="alicia-ana">R$ 46.155,86</strong>
            </span>
            <input
              type="range"
              min="0"
              max="200000"
              step="100"
              value="46155.86"
              data-slider="alicia-ana"
              aria-label="Valor de positivação Ana e Alicia"
            />
          </label>
        </div>
      </section>
    </section>

    <footer class="brand-footer" aria-label="Rodapé GrupoFarma">
      <img class="brand-logo brand-logo-grupofarma" src="./assets/grupofarma-logo.png" alt="GrupoFarma" />
    </footer>
  </main>

  <script src="./script.js"></script>
</body>
</html>
