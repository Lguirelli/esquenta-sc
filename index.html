<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#003f10" />
  <title>Dia D Eurofarma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Kannada:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell background-screen" data-portfolio-app="dia-d-eurofarma">
    <header class="brand-header" aria-label="Cabeçalho Opella">
      <img class="brand-logo brand-logo-opella" src="./assets/opella-logo.png" alt="Opella" />
    </header>

    <section class="ranking-area" aria-label="Ranking de positivação individual">
      <section class="podium" id="podium" aria-live="polite">
        <article class="participant" data-participant="michele">
          <div class="participant-stage">
            <div class="participant-sticker"><img class="participant-image" src="./assets/participantes/michele/neutra.png" alt="Michele" /></div>
          </div>
          <span class="participant-name">Michele</span>
        </article>

        <article class="participant" data-participant="marcelly">
          <div class="participant-stage">
            <div class="participant-sticker"><img class="participant-image" src="./assets/participantes/marcelly/neutra.png" alt="Marcelly" /></div>
          </div>
          <span class="participant-name">Marcelly</span>
        </article>

        <article class="participant" data-participant="pamela">
          <div class="participant-stage">
            <div class="participant-sticker"><img class="participant-image" src="./assets/participantes/pamela/neutra.png" alt="Pamela" /></div>
          </div>
          <span class="participant-name">Pamela</span>
        </article>

        <article class="participant" data-participant="yasmin">
          <div class="participant-stage">
            <div class="participant-sticker"><img class="participant-image" src="./assets/participantes/yasmin/neutra.png" alt="Yasmin" /></div>
          </div>
          <span class="participant-name">Yasmin</span>
        </article>
      </section>
    </section>

    <footer class="brand-footer" aria-label="Rodapé GrupoFarma">
      <img class="brand-logo brand-logo-grupofarma" src="./assets/grupofarma-logo.png" alt="GrupoFarma" />
    </footer>
  </main>

  <script src="./script.js"></script>
</body>
</html>
